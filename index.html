<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>绕过Edge下载限制</title>
<style>
body{padding:30px;background:#111;color:#fff}
input{width:100%;padding:12px;margin:10px 0}
button{padding:12px 25px;background:#0078d4;color:white;border:none;width:100%}
</style>
</head>
<body>
<h1>🔓 Edge 下载解锁器</h1>
<input type="text" id="url" placeholder="输入文件直链">
<button onclick="start()">下载</button>

<script>
async function start(){
  const url = document.getElementById('url').value;
  const res = await fetch(url);
  const blob = await res.blob();
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = url.split('/').pop();
  a.click();
}
</script>
</body>
</html>
